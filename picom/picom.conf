backend = "glx";
vsync = true;
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.25;
shadow-offset-x = -6;
shadow-offset-y = -6;
corner-radius = 10;
round-borders = 1;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'floorp'",
  "window_type = 'dock'"
];

opacity-rule = [
    "88:class_g = 'firefox'",
    "88:class_g = 'floorp'",
    "90:class_g = 'code'"
];

blur-background-frame = true;

blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-kern = "3x3box";

blur-background-exclude = [
    "class_g = 'kitty'",
    "class_g = 'Alacritty'",
    "class_g = 'polybar'",
    "class_g = 'code'"
];
