[colors]
background = #99000000
foreground = #cdd6f4
primary = #89b4fa
secondary = #a6adc8
alert = #f38ba8

[bar/main]
bottom = false

width = 100%
height = 24
radius = 20

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = Noto Sans CJK JP:size=11;2

modules-left = i3
modules-center = date
modules-right = wlan battery pulseaudio memory

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

tray-position = right
tray-padding = 2

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = false
enable-click = true
enable-scroll = false

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = #1e1e2e
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d
time = %H:%M

label = %date% %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
label = %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
label-volume = %percentage%%

label-muted = MUTE

[module/wlan]
type = internal/network
interface = wlp0s20f3
interval = 3

label-connected = %essid%
label-disconnected = Offline

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC

full-at = 98

label-charging = ⚡ %percentage%%
label-discharging = 🔋 %percentage%%
label-full = Full
